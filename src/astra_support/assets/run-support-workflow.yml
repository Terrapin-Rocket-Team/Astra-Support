name: Run Astra Support

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pipx
        run: pip install --upgrade pipx
      - name: Install Astra Support CLI
        run: pipx install "__SUPPORT_INSTALL__"
      - name: Run doctor
        run: astra-support doctor --project .
      - name: Run managed tests
        run: astra-support test --project . --clean --no-progress
